{% extends 'base.html' %}

{% block title %}Login — SafariGrants{% endblock %}

{% block content %}

<section class="min-h-screen flex items-center justify-center py-32 px-4"
         style="background:linear-gradient(135deg,#1a0f0a 0%,#2C1810 100%);">

    <!-- Background pattern -->
    <div class="absolute inset-0 opacity-5"
         style="background-image:radial-gradient(circle, #E8651A 1px, transparent 1px);
                background-size:30px 30px;"></div>

    <div class="relative z-10 w-full max-w-md">

        <!-- Logo -->
        <div class="text-center mb-8">
            <a href="/">
                <img src="/static/images/logo.png"
                     alt="SafariGrants"
                     class="h-20 w-auto mx-auto drop-shadow-lg">
            </a>
            <h1 class="font-display text-3xl font-black text-white mt-4">
                Welcome Back!
            </h1>
            <p class="text-gray-400 text-sm mt-2">
                Login to access your opportunities and bookings
            </p>
        </div>

        <!-- Login Form -->
        <div class="rounded-3xl p-8"
             style="background:rgba(255,255,255,0.05);
                    border:1px solid rgba(255,255,255,0.1);
                    backdrop-filter:blur(10px);">

            <form method="POST" action="/login/" class="space-y-5">
                {% csrf_token %}

                <!-- Email -->
                <div>
                    <label class="text-gray-400 text-xs font-semibold uppercase tracking-wider mb-1 block">
                        Email Address
                    </label>
                    <div class="relative">
                        <i class="fas fa-envelope absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                        <input type="email"
                               name="email"
                               placeholder="your@email.com"
                               required
                               class="w-full rounded-xl pl-11 pr-4 py-3.5 text-sm text-white focus:outline-none transition-all"
                               style="background:rgba(255,255,255,0.08);
                                      border:1px solid rgba(255,255,255,0.15);"
                               onfocus="this.style.borderColor='#E8651A'"
                               onblur="this.style.borderColor='rgba(255,255,255,0.15)'">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <div class="flex justify-between items-center mb-1">
                        <label class="text-gray-400 text-xs font-semibold uppercase tracking-wider">
                            Password
                        </label>
                        <a href="/forgot-password/"
                           class="text-xs transition-colors"
                           style="color:#E8651A;">
                            Forgot password?
                        </a>
                    </div>
                    <div class="relative">
                        <i class="fas fa-lock absolute left-4 top-1/2 -translate-y-1/2 text-gray-500 text-sm"></i>
                        <input type="password"
                               name="password"
                               placeholder="Your password"
                               required
                               class="w-full rounded-xl pl-11 pr-4 py-3.5 text-sm text-white focus:outline-none transition-all"
                               style="background:rgba(255,255,255,0.08);
                                      border:1px solid rgba(255,255,255,0.15);"
                               onfocus="this.style.borderColor='#E8651A'"
                               onblur="this.style.borderColor='rgba(255,255,255,0.15)'">
                    </div>
                </div>

                <!-- Remember Me -->
                <div class="flex items-center gap-3">
                    <input type="checkbox"
                           name="remember"
                           style="accent-color:#E8651A;">
                    <p class="text-gray-400 text-sm">Remember me</p>
                </div>

                <!-- Submit -->
                <button type="submit"
                        class="w-full py-4 rounded-xl font-bold text-white text-sm transition-all transform hover:scale-105 shadow-lg"
                        style="background:linear-gradient(135deg,#E8651A,#C0392B);">
                    🔐 Login to SafariGrants
                </button>
            </form>

            <!-- Divider -->
            <div class="flex items-center gap-3 my-5">
                <div class="flex-1 h-px" style="background:rgba(255,255,255,0.1);"></div>
                <span class="text-gray-500 text-xs">or</span>
                <div class="flex-1 h-px" style="background:rgba(255,255,255,0.1);"></div>
            </div>

            <!-- Register Link -->
            <p class="text-center text-gray-400 text-sm">
                Don't have an account?
                <a href="/register/"
                   class="font-bold transition-colors"
                   style="color:#E8651A;">
                    Create one free →
                </a>
            </p>
        </div>
    </div>
</section>

{% endblock %}
